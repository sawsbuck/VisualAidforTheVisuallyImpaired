<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Accessibility Assistant</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="container">
        <div class="header">
            <h1 class="title">🎤 AI Assistant</h1>
        </div>
        
        <div class="content">
            <div class="status-badge" id="statusBadge">Ready</div>
            
            <div class="section">
                <h2>Voice Commands</h2>
                <ul class="command-list">
                    <li><kbd>V</kbd> - Start voice recognition</li>
                    <li><kbd>S</kbd> - Scroll right</li>
                </ul>
            </div>

            <div class="section">
                <h2>Features</h2>
                <ul class="feature-list">
                    <li>✓ Voice-controlled web navigation</li>
                    <li>✓ Speech-to-text recognition</li>
                    <li>✓ Text-to-speech feedback</li>
                    <li>✓ Works on any website</li>
                </ul>
            </div>

            <div class="section">
                <h2>Status</h2>
                <p id="statusText" class="status-text">Extension is active and ready to use.</p>
            </div>

            <button id="activateBtn" class="btn btn-primary">
                🎯 Activate Voice Control
            </button>
        </div>

        <div class="footer">
            <p class="version">v1.0.0</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="logger.js"></script>
    <script src="speech-service.js"></script>
    <script src="popup.js"></script>
</body>
</html>
